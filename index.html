<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE ALPHA — 글로벌 듀얼 마켓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #080d1a; }
        .bar-fill { transition: width 1.2s cubic-bezier(.4,0,.2,1); }
        .card-gold   { border-color: #FFD70055; background: #FFD70008; }
        .card-silver { border-color: #C0C0C055; background: #C0C0C008; }
        .card-bronze { border-color: #CD7F3255; background: #CD7F3208; }
        .card-4      { border-color: #60a5fa55; background: #60a5fa08; }
        .card-5      { border-color: #34d39955; background: #34d39908; }
        .badge { display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600; }
        .market-btn { transition: all 0.3s; border: 1px solid #1f2937; }
        .market-btn.active { background: #1e40af; border-color: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen">

<header class="px-6 pt-8 pb-4 max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-black tracking-tighter text-white">
            <i class="fa-solid fa-earth-americas text-blue-400 mr-2"></i>GLOBAL ALPHA
        </h1>
        <div class="flex bg-[#111827] p-1 rounded-xl border border-gray-800">
            <button onclick="switchMarket('kr')" id="btn-kr" class="market-btn active px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2">
                <span>🇰🇷</span> 한국 시장
            </button>
            <button onclick="switchMarket('us')" id="btn-us" class="market-btn px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 text-gray-500 ml-1">
                <span>🇺🇸</span> 미국 시장
            </button>
        </div>
    </div>
    <div class="flex justify-between items-end">
        <div>
            <p id="strategy-desc" class="text-gray-500 text-xs">전략 분석 중...</p>
        </div>
        <div class="text-right">
            <div id="update-time" class="text-gray-500 text-[10px]"></div>
            <div id="base-date" class="text-gray-600 text-[10px] mt-0.5"></div>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-6 pb-16">
    <div id="kpi-section" class="grid grid-cols-4 gap-3 mb-8 mt-4">
        <div class="bg-[#111827] rounded-xl p-4 border border-gray-800 text-center">
            <p class="text-gray-500 text-[11px] mb-1">승률 (목표달성)</p>
            <p id="win-rate" class="text-2xl font-black text-green-400">--%</p>
        </div>
        <div class="bg-[#111827] rounded-xl p-4 border border-gray-800 text-center">
            <p class="text-gray-500 text-[11px] mb-1">평균 수익률</p>
            <p id="avg-return" class="text-2xl font-black text-blue-400">--%</p>
        </div>
        <div class="bg-[#111827] rounded-xl p-4 border border-gray-800 text-center">
            <p class="text-gray-500 text-[11px] mb-1">포착 종목</p>
            <p id="candidate-count" class="text-2xl font-black text-yellow-400">--</p>
        </div>
        <div class="bg-[#111827] rounded-xl p-4 border border-gray-800 text-center">
            <p id="kpi-4-label" class="text-gray-500 text-[11px] mb-1">기관 연속</p>
            <p id="kpi-4-val" class="text-2xl font-black text-purple-400">--</p>
        </div>
    </div>

    <div id="top-container" class="space-y-4 mb-10">
        <div class="text-center text-gray-600 py-20 italic">데이터 로딩 중...</div>
    </div>
</main>

<script>
let currentMarket = 'kr';
const RANKS = [
    { label:'#1', cardCls:'card-gold',   color:'#FFD700' },
    { label:'#2', cardCls:'card-silver', color:'#C0C0C0' },
    { label:'#3', cardCls:'card-bronze', color:'#CD7F32' },
    { label:'#4', cardCls:'card-4',      color:'#60a5fa' },
    { label:'#5', cardCls:'card-5',      color:'#34d399' },
];

function switchMarket(market) {
    currentMarket = market;
    document.getElementById('btn-kr').className = `market-btn px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 ${market === 'kr' ? 'active' : 'text-gray-500'}`;
    document.getElementById('btn-us').className = `market-btn px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 ${market === 'us' ? 'active' : 'text-gray-500'}`;
    loadData();
}

function loadData() {
    const fileName = currentMarket === 'kr' ? 'stock_data.json' : 'stock_data_us.json';
    const container = document.getElementById('top-container');
    container.innerHTML = '<div class="text-center text-gray-600 py-20 italic">데이터를 불러오는 중입니다...</div>';

    fetch(fileName)
        .then(r => { if(!r.ok) throw new Error('데이터 없음'); return r.json(); })
        .then(data => {
            renderHeader(data);
            renderKPI(data);
            renderList(data);
        })
        .catch(e => {
            container.innerHTML = `<div class="text-center text-red-400 py-20 text-xs">⚠️ ${currentMarket.toUpperCase()} 데이터를 찾을 수 없습니다.</div>`;
        });
}

function renderHeader(data) {
    const now = new Date();
    document.getElementById('update-time').textContent = `분석완료: ${now.toLocaleString()}`;
    document.getElementById('base-date').textContent = `기준일: ${data.base_date || '-'}`;
    document.getElementById('strategy-desc').textContent = currentMarket === 'kr' 
        ? '기관 3일 연속 × 52주 돌파 임박 × VCP — 한국 시장 승률 극대화 전략' 
        : 'Micro-Float × High Short Interest — 미국 시장 숏스퀴즈 메가 러너 탐지';
}

function renderKPI(data) {
    const perf = data.performance || {};
    document.getElementById('win-rate').textContent = perf.win_rate ? perf.win_rate + '%' : '--%';
    document.getElementById('avg-return').textContent = perf.avg_return ? (perf.avg_return >= 0 ? '+' : '') + perf.avg_return + '%' : '--%';
    document.getElementById('candidate-count').textContent = (data.today_picks?.length || 0) + '건';
    
    if(currentMarket === 'kr') {
        document.getElementById('kpi-4-label').textContent = '기관연속 통과';
        document.getElementById('kpi-4-val').textContent = (data.filter_log?.inst3 || 0) + '건';
        document.getElementById('kpi-4-val').className = 'text-2xl font-black text-purple-400';
    } else {
        document.getElementById('kpi-4-label').textContent = '분석 상태';
        document.getElementById('kpi-4-val').textContent = 'US Active';
        document.getElementById('kpi-4-val').className = 'text-2xl font-black text-red-400';
    }
}

function renderList(data) {
    const container = document.getElementById('top-container');
    const picks = data.today_picks || [];
    container.innerHTML = '';

    if (picks.length === 0) {
        container.innerHTML = `<div class="bg-[#111827] border border-gray-800 rounded-2xl p-10 text-center text-gray-500">조건 충족 종목 없음</div>`;
        return;
    }

    picks.forEach((item, i) => {
        const rm = RANKS[i] || RANKS[4];
        const currency = currentMarket === 'kr' ? '원' : '$';
        container.innerHTML += `
        <div class="rounded-2xl border overflow-hidden ${rm.cardCls} mb-4">
            <div class="flex">
                <div class="flex-shrink-0 w-14 flex items-center justify-center border-r" style="border-color:${rm.color}33; background:${rm.color}11;">
                    <span class="text-xl font-black" style="color:${rm.color}">${rm.label}</span>
                </div>
                <div class="flex-1 p-5">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="text-xl font-black text-white">${item.name}</div>
                            <div class="text-[11px] text-gray-500 uppercase">${item.code} · 현재가 ${item.cur_price.toLocaleString()}${currency}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-yellow-400 font-black text-lg">${item.score}</div>
                            <div class="badge bg-gray-800 text-gray-400 mt-1">${item.supply}</div>
                        </div>
                    </div>
                    <div class="text-[11px] text-gray-400 bg-black/20 rounded-lg px-3 py-2 mb-4 leading-relaxed border-l-2 border-gray-600">
                        ${item.company_summary || item.tags}
                    </div>
                    <div class="text-right text-green-400 font-black text-sm">기대수익 ${item.expected_return}</div>
                </div>
            </div>
        </div>`;
    });
}

loadData();
</script>
</body>
</html>
