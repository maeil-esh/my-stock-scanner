name: KR Scanner

on:
  schedule:
    - cron: '33 0 * * 1-5'   # 09:47 KST (월~금)
    - cron: '7 4  * * 1-5'   # 13:12 KST (월~금)
    - cron: '17 7 * * 1-5'   # 16:25 KST (월~금)
  workflow_dispatch:

jobs:
  kr-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run KR Scanner
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python engine_kr.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          grep -qxF '__pycache__/' .gitignore || echo '__pycache__/' >> .gitignore
          git pull origin main --rebase --autostash
          git add stock_data.json history.json .gitignore
          git diff --staged --quiet || git commit -m "KR scan [$(date +'%Y-%m-%d %H:%M KST')]"
          git push
