name: Stock-Auto-Update
on:
  schedule:
    - cron: '0 1 * * 1-5'    # KST 10:00 — 아침 전체 수급
    - cron: '0 7 * * 1-5'    # KST 16:00 — 한국 장 마감 후
    - cron: '0 21 * * 1-5'   # KST 06:00 — 미국 장 마감 후
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install libraries
        run: |
          pip install pykrx pandas finance-datareader numpy requests beautifulsoup4 yfinance
      - name: Run Analysis Engine
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: "7497968326"
        run: python engine.py
      - name: Update Data and History
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stock_data.json stock_data_us.json history.json
          git commit -m "자동 분석 업데이트" || echo "No changes to commit"
          git push
