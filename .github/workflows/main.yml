name: Stock-Auto-Update
on:
  schedule:
    # 한국 시간 밤 9시 (UTC 12:00) / 월~금 실행
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # 언제든 수동으로 실행하고 싶을 때 사용하는 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # git push 권한 명시 (GitHub 기본 정책 변경 대응)
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pykrx pandas finance-datareader numpy requests beautifulsoup4 yfinance

      - name: Run Analysis Engine
        run: python engine.py

      - name: Update Data and History
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stock_data.json stock_data_us.json history.json
          git commit -m "NXT 마감 데이터 분석 및 히스토리 업데이트" || echo "No changes to commit"
          git push
