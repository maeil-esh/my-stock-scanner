name: Stock Scanner

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행 (필요 시 수정)
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────
  # KR Scanner
  # ───────────────────────────────────────────
  kr-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run KR Scanner
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python engine_kr.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git pull origin main --rebase --autostash
          git add -A -- ':!__pycache__'
          if git diff --staged --quiet; then
            echo "No changes to commit (조건 미충족 또는 결과 없음)"
          else
            git commit -m "KR scan results [$(date +'%Y-%m-%d %H:%M KST')]"
            git push
          fi

  # ───────────────────────────────────────────
  # US Scanner
  # ───────────────────────────────────────────
  us-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run US Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python engine_us.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git pull origin main --rebase --autostash
          git add -A -- ':!__pycache__'
          if git diff --staged --quiet; then
            echo "No changes to commit (조건 미충족 또는 결과 없음)"
          else
            git commit -m "US scan results [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
