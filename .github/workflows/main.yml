name: Stock-Auto-Update
on:
  schedule:
    # 한국 시간 밤 9시 (UTC 12:00) / 월~금 실행
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 3.11로 수정

      - name: Install libraries
        run: |
          # yfinance 추가 설치
          pip install pykrx pandas finance-datareader numpy requests beautifulsoup4 yfinance

      - name: Run Analysis Engine
        run: python engine.py

      - name: Update Data and History
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # stock_data_us.json 파일도 추적하도록 추가
          git add stock_data.json stock_data_us.json history.json
          git commit -m "KR/US 마감 데이터 분석 및 업데이트" || echo "No changes to commit"
          git push
