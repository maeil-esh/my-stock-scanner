name: Stock-Auto-Update
on:
  schedule:
    # ── 한국 시장 (KST 기준, UTC-9시간) / 월~금 ──
    - cron: '0 1 * * 1-5'    # KST 10:00 (장 시작 1시간 후)
    - cron: '0 3 * * 1-5'    # KST 12:00 (오전 마감)
    - cron: '0 5 * * 1-5'    # KST 14:00 (막판 장세)
    - cron: '0 6 * * 1-5'    # KST 15:40 (장 마감 직후)
    # ── 미국 시장 (KST 기준) / 월~금 ──
    - cron: '0 20 * * 1-5'   # KST 06:00 (미국 정규장 마감 후)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # git push 권한 명시 (GitHub 기본 정책 변경 대응)
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install libraries
        run: |
          pip install pykrx pandas finance-datareader numpy requests beautifulsoup4 yfinance

      - name: Run Analysis Engine
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: "7497968326"
        run: python engine.py

      - name: Update Data and History
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stock_data.json stock_data_us.json history.json
          git commit -m "NXT 마감 데이터 분석 및 히스토리 업데이트" || echo "No changes to commit"
          git push
