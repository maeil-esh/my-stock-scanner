name: US-Scan

on:
  schedule:
    - cron: '0 22 * * 0-4'   # KST 07:00 (UTC 22:00 전날 일~목)
  workflow_dispatch:

# kr-scan과 별도 그룹 — 서로 블로킹 없음
concurrency:
  group: us-scan
  cancel-in-progress: false

jobs:
  us-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run US Scanner
        run: python engine_us.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git pull --rebase origin main
          git add stock_data_us.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "US scan $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
