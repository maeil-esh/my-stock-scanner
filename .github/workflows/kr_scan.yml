
name: KR-Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'   # 09:30 KST (UTC 00:30) 장 시작
    - cron: '0 4 * * 1-5'    # 13:00 KST (UTC 04:00) 장 중간
    - cron: '0 7 * * 1-5'    # 16:00 KST (UTC 07:00) 장 마감
  workflow_dispatch:

jobs:
  kr-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DART_API_KEY:     ${{ secrets.DART_API_KEY }}
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pykrx pandas finance-datareader yfinance requests beautifulsoup4 numpy

      - name: Run KR Scanner
        run: python engine_kr.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stock_data.json history.json
          git commit -m "KR scan $(date +'%Y-%m-%d %H:%M KST')" || echo "No changes"
          git push
