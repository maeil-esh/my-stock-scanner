name: Run Stock Scanner

on:
  push:
    branches: [ "main" ]  # 코드를 올릴 때마다 실행
  schedule:
    - cron: '0 9 * * 1-5' # 평일 오후 6시(KST)마다 자동 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas pykrx  # pykrx 라이브러리 설치

      - name: Run Ultimate Alpha Engine v3
        run: python engine.py      # 엔진 실행

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json history.json || true
          git commit -m "🚀 주식 데이터 업데이트 ($(date +'%Y-%m-%d %H:%M'))" || echo "No changes to commit"
          git push
