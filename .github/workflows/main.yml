name: Stock-Auto-Update

on:
  schedule:
    # 한국 시간 기준 매일 밤 9시 10분 실행 (UTC 12:10)
    - cron: '10 12 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 에러의 원인이 된 cache 부분을 삭제했습니다.

      - name: Install High-Performance Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pykrx pandas finance-datareader numpy requests beautifulsoup4 yfinance lxml

      - name: Run Ultimate Alpha Engine v3
        env:
          PYTHONUNBUFFERED: "1"
        run: python engine.py

      - name: Commit and Push Dual Market Data
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # 파일이 있을 때만 추가하도록 안전장치 강화
          git add stock_data.json || echo "KR data missing"
          git add stock_data_us.json || echo "US data missing"
          git add history.json || echo "History missing"
          
          if git diff --staged --quiet; then
            echo "업데이트할 변경 사항이 없습니다."
          else
            git commit -m "📈 글로벌 마감 데이터 업데이트 (KR/US)"
            git push
          fi
