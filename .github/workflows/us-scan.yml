name: US-Scan

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행 (기존 스케줄에 맞게 수정)
  workflow_dispatch:

jobs:
  us-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run US Scanner
        run: python us_scanner.py  # 실제 스크립트명으로 수정

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git pull origin main --rebase --autostash
          git add -A
          git diff --staged --quiet || git commit -m "Update scan results [$(date +'%Y-%m-%d %H:%M')]"
          git push
